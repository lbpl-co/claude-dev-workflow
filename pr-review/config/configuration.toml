[config]
model = "ollama/gemma4"
fallback_models = ["ollama/gemma4"]
custom_model_max_tokens = 128000
git_provider = "bitbucket"
duplicate_examples = true

[pr_reviewer]
# Extra instructions for every review (optional — uncomment and customise)
# extra_instructions = "Focus on security, error handling, and test coverage."

[pr_code_suggestions]
commitable_code_suggestions = true

[ai]
# Increase timeout for local models (default 120s may not be enough for large PRs)
ai_timeout = 300
